<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — FinBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Supabase JS v2 desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --negro:      #0A0A0A;
      --negro-card: #141414;
      --negro-med:  #1C1C1C;
      --negro-borde:#2A2A2A;
      --dorado:     #C9A84C;
      --dorado-claro:#D4B96A;
      --dorado-dark:#A8893A;
      --blanco:     #FFFFFF;
      --gris:       #9CA3AF;
      --gris-claro: #E5E7EB;
      --rojo:       #EF4444;
      --verde:      #22C55E;
      --radio:      12px;
      --trans:      all .3s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--negro);
      color: var(--blanco);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ============================================================
       FONDO DECORATIVO
    ============================================================ */
    body::before {
      content: '';
      position: fixed; top: -30%; right: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -20%; left: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,.05) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    /* ============================================================
       CONTENEDOR PRINCIPAL
    ============================================================ */
    .auth-container {
      width: 100%; max-width: 520px;
      position: relative; z-index: 1;
    }

    /* Logo */
    .auth-logo {
      text-align: center; margin-bottom: 32px;
    }
    .auth-logo a {
      text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      display: flex; align-items: center; justify-content: center;
      color: var(--negro); font-size: 1.1rem;
    }
    .logo-text { font-size: 1.5rem; font-weight: 700; color: var(--blanco); }
    .logo-text span { color: var(--dorado); }

    /* Card del formulario */
    .auth-card {
      background: var(--negro-card);
      border: 1px solid var(--negro-borde);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .auth-card h1 {
      font-size: 1.5rem; font-weight: 700;
      color: var(--blanco); margin-bottom: 8px;
    }
    .auth-card .subtitle {
      font-size: .9rem; color: var(--gris); margin-bottom: 32px;
    }

    /* Steps indicator */
    .steps {
      display: flex; gap: 8px; margin-bottom: 28px;
    }
    .step {
      flex: 1; height: 4px; border-radius: 4px;
      background: var(--negro-borde); transition: var(--trans);
    }
    .step.active { background: var(--dorado); }
    .step.done { background: var(--verde); }

    /* Campos del formulario */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: .82rem; font-weight: 600;
      color: var(--gris-claro); margin-bottom: 8px;
    }
    .form-group label .req { color: var(--dorado); }
    .input-wrapper {
      position: relative; display: flex; align-items: center;
    }
    .input-wrapper i {
      position: absolute; left: 14px;
      color: var(--gris); font-size: .9rem; pointer-events: none;
    }
    .form-group input,
    .form-group select {
      width: 100%; padding: 13px 42px 13px 42px;
      background: var(--negro-med); border: 1.5px solid var(--negro-borde);
      border-radius: 8px; color: var(--blanco);
      font-family: inherit; font-size: .9rem;
      transition: var(--trans); outline: none;
      -webkit-appearance: none;
    }
    .form-group select { padding-left: 42px; cursor: pointer; }
    .form-group select option { background: var(--negro-med); color: var(--blanco); }
    .form-group input::placeholder { color: #555; }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--dorado);
      box-shadow: 0 0 0 3px rgba(201,168,76,.15);
    }
    .form-group input:focus + i,
    .form-group input:focus ~ i { color: var(--dorado); }

    /* Toggle contraseña */
    .toggle-pass {
      position: absolute; right: 14px;
      background: none; border: none; cursor: pointer;
      color: var(--gris); font-size: .9rem; pointer-events: all;
    }
    .toggle-pass:hover { color: var(--dorado); }

    /* Botón submit */
    .btn-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      color: var(--negro); font-family: inherit;
      font-size: 1rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: var(--trans); margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,.35);
    }
    .btn-submit:disabled {
      opacity: .6; cursor: not-allowed; transform: none; box-shadow: none;
    }

    /* Steps navigation buttons */
    .btn-row { display: flex; gap: 12px; margin-top: 8px; }
    .btn-secondary {
      flex: 1; padding: 13px;
      background: var(--negro-med); border: 1.5px solid var(--negro-borde);
      color: var(--gris-claro); font-family: inherit;
      font-size: .9rem; font-weight: 600;
      border-radius: 10px; cursor: pointer; transition: var(--trans);
    }
    .btn-secondary:hover { border-color: var(--dorado); color: var(--dorado); }
    .btn-next {
      flex: 1; padding: 13px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      color: var(--negro); font-family: inherit;
      font-size: .9rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; transition: var(--trans);
    }
    .btn-next:hover { box-shadow: 0 6px 20px rgba(201,168,76,.3); }

    /* Link inferior */
    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: .88rem; color: var(--gris);
    }
    .auth-footer a { color: var(--dorado); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    /* Mensajes de error / éxito */
    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: .85rem; font-weight: 500;
      margin-bottom: 20px; display: none;
      align-items: center; gap: 10px;
    }
    .alert.error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #FCA5A5;
    }
    .alert.success {
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3);
      color: #86EFAC;
    }
    .alert.show { display: flex; }

    /* Ocultar secciones del formulario multi-step */
    .form-step { display: none; }
    .form-step.active { display: block; }

    /* Perfil inversor cards */
    .profile-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .profile-option {
      padding: 16px; border-radius: 10px;
      background: var(--negro-med); border: 1.5px solid var(--negro-borde);
      cursor: pointer; transition: var(--trans);
    }
    .profile-option:hover { border-color: var(--dorado); }
    .profile-option.selected {
      border-color: var(--dorado);
      background: rgba(201,168,76,.08);
    }
    .profile-option input { display: none; }
    .profile-option .po-title {
      font-weight: 700; font-size: .92rem; color: var(--blanco); margin-bottom: 4px;
    }
    .profile-option .po-desc { font-size: .8rem; color: var(--gris); line-height: 1.5; }
    .profile-option .po-icon { margin-right: 8px; color: var(--dorado); }

    /* Legal */
    .legal-check {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 20px; cursor: pointer;
    }
    .legal-check input[type="checkbox"] {
      width: 18px; height: 18px; margin-top: 2px;
      accent-color: var(--dorado); flex-shrink: 0;
    }
    .legal-check label {
      font-size: .8rem; color: var(--gris); line-height: 1.5; cursor: pointer;
    }
    .legal-check label a { color: var(--dorado); text-decoration: none; }

    /* Responsive */
    @media (max-width: 600px) {
      .auth-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="auth-container">

  <!-- Logo -->
  <div class="auth-logo">
    <a href="index.html">
      <div class="logo-icon"><i class="fas fa-bridge"></i></div>
      <span class="logo-text">FinBridge <span>IA</span></span>
    </a>
  </div>

  <!-- Card del formulario -->
  <div class="auth-card">
    <h1>Creá tu cuenta</h1>
    <p class="subtitle">Empezá a invertir en el mercado de capitales argentino</p>

    <!-- Steps -->
    <div class="steps">
      <div class="step active" id="stepDot1"></div>
      <div class="step" id="stepDot2"></div>
      <div class="step" id="stepDot3"></div>
    </div>

    <!-- Alertas -->
    <div class="alert error" id="alertError"><i class="fas fa-circle-exclamation"></i><span id="errorMsg"></span></div>
    <div class="alert success" id="alertSuccess"><i class="fas fa-circle-check"></i><span id="successMsg"></span></div>

    <form id="registerForm" novalidate>

      <!-- ═══════════ PASO 1: Datos personales ═══════════ -->
      <div class="form-step active" id="step1">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="text" id="nombre" placeholder="Tu nombre" required />
              <i class="fas fa-user"></i>
            </div>
          </div>
          <div class="form-group">
            <label>Apellido <span class="req">*</span></label>
            <div class="input-wrapper">
              <input type="text" id="apellido" placeholder="Tu apellido" required />
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Email <span class="req">*</span></label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="tu@email.com" required />
            <i class="fas fa-envelope"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Contraseña <span class="req">*</span> <small style="color:#555;font-weight:400">(mínimo 8 caracteres)</small></label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••" minlength="8" required />
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-pass" onclick="togglePass('password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Repetir contraseña <span class="req">*</span></label>
          <div class="input-wrapper">
            <input type="password" id="password2" placeholder="••••••••" required />
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-pass" onclick="togglePass('password2', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="button" class="btn-next" onclick="goToStep(2)" style="width:100%">
          Siguiente <i class="fas fa-arrow-right"></i>
        </button>
      </div>

      <!-- ═══════════ PASO 2: Datos fiscales ═══════════ -->
      <div class="form-step" id="step2">
        <div class="form-group">
          <label>CUIT <small style="color:#555;font-weight:400">(sin guiones)</small></label>
          <div class="input-wrapper">
            <input type="text" id="cuit" placeholder="20123456789" maxlength="11" pattern="[0-9]{11}" />
            <i class="fas fa-id-card"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Tipo de persona</label>
          <div class="input-wrapper">
            <select id="tipoPersona">
              <option value="fisica">Persona física</option>
              <option value="pyme">PyME / Empresa</option>
            </select>
            <i class="fas fa-building"></i>
          </div>
        </div>
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <div class="input-wrapper">
            <input type="tel" id="telefono" placeholder="+54 9 11 XXXX-XXXX" />
            <i class="fas fa-phone"></i>
          </div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="goToStep(1)">
            <i class="fas fa-arrow-left"></i> Atrás
          </button>
          <button type="button" class="btn-next" onclick="goToStep(3)">
            Siguiente <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- ═══════════ PASO 3: Perfil inversor ═══════════ -->
      <div class="form-step" id="step3">
        <p style="font-size:.88rem;color:var(--gris);margin-bottom:16px;">
          ¿Cómo te definirías como inversor?
        </p>
        <div class="profile-options">
          <label class="profile-option" onclick="selectProfile('conservador', this)">
            <input type="radio" name="perfil" value="conservador" />
            <div class="po-title"><i class="fas fa-shield-halved po-icon"></i>Conservador</div>
            <div class="po-desc">Preferís seguridad y estabilidad. FCI, bonos y plazos fijos son lo tuyo.</div>
          </label>
          <label class="profile-option selected" onclick="selectProfile('moderado', this)">
            <input type="radio" name="perfil" value="moderado" checked />
            <div class="po-title"><i class="fas fa-balance-scale po-icon"></i>Moderado</div>
            <div class="po-desc">Buscás un equilibrio entre riesgo y retorno. Mix de renta fija y variable.</div>
          </label>
          <label class="profile-option" onclick="selectProfile('agresivo', this)">
            <input type="radio" name="perfil" value="agresivo" />
            <div class="po-title"><i class="fas fa-rocket po-icon"></i>Agresivo</div>
            <div class="po-desc">Tolerás alta volatilidad a cambio de mayor rendimiento. Acciones, Cedears, cripto.</div>
          </label>
        </div>

        <div class="legal-check">
          <input type="checkbox" id="aceptaTerminos" />
          <label for="aceptaTerminos">
            Acepto los <a href="#">Términos y Condiciones</a> y la
            <a href="#">Política de Privacidad</a> de FinBridge IA.
          </label>
        </div>

        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="goToStep(2)">
            <i class="fas fa-arrow-left"></i> Atrás
          </button>
          <button type="submit" class="btn-submit" id="submitBtn" style="flex:1">
            <i class="fas fa-user-plus"></i> Crear cuenta
          </button>
        </div>
      </div>

    </form>
  </div>

  <!-- Footer -->
  <p class="auth-footer">
    ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
  </p>

</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
  // ── Configuración de Supabase ──────────────────────────────
  const SUPABASE_URL = 'https://hvncglkziyuclnwgrfgj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_43vDXqAmhBtNpnBnkEU8og_BmOSEe1W';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Estado del perfil seleccionado ─────────────────────────
  let perfilSeleccionado = 'moderado';

  // ── Multi-step navigation ─────────────────────────────────
  function goToStep(num) {
    // Validar paso 1 antes de avanzar
    if (num === 2) {
      const nombre   = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const email    = document.getElementById('email').value.trim();
      const pass     = document.getElementById('password').value;
      const pass2    = document.getElementById('password2').value;

      if (!nombre || !apellido || !email || !pass) {
        showError('Completá todos los campos obligatorios.');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Ingresá un email válido.');
        return;
      }
      if (pass.length < 8) {
        showError('La contraseña debe tener al menos 8 caracteres.');
        return;
      }
      if (pass !== pass2) {
        showError('Las contraseñas no coinciden.');
        return;
      }
      hideAlerts();
    }

    // Mostrar paso correcto
    document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + num).classList.add('active');

    // Actualizar indicadores
    for (let i = 1; i <= 3; i++) {
      const dot = document.getElementById('stepDot' + i);
      dot.classList.remove('active', 'done');
      if (i < num) dot.classList.add('done');
      if (i === num) dot.classList.add('active');
    }
  }

  // ── Seleccionar perfil inversor ────────────────────────────
  function selectProfile(perfil, el) {
    perfilSeleccionado = perfil;
    document.querySelectorAll('.profile-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  // ── Toggle visibilidad de contraseña ───────────────────────
  function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  // ── Alertas ────────────────────────────────────────────────
  function showError(msg) {
    hideAlerts();
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('alertError').classList.add('show');
  }
  function showSuccess(msg) {
    hideAlerts();
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('alertSuccess').classList.add('show');
  }
  function hideAlerts() {
    document.getElementById('alertError').classList.remove('show');
    document.getElementById('alertSuccess').classList.remove('show');
  }

  // ── Submit: registro con Supabase ──────────────────────────
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlerts();

    // Verificar checkbox de términos
    if (!document.getElementById('aceptaTerminos').checked) {
      showError('Tenés que aceptar los Términos y Condiciones para continuar.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';

    // Recopilar datos del formulario
    const nombre       = document.getElementById('nombre').value.trim();
    const apellido     = document.getElementById('apellido').value.trim();
    const email        = document.getElementById('email').value.trim();
    const password     = document.getElementById('password').value;
    const cuit         = document.getElementById('cuit').value.trim();
    const tipoPersona  = document.getElementById('tipoPersona').value;
    const telefono     = document.getElementById('telefono').value.trim();

    try {
      // 1. Registrar usuario en Supabase Auth
      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            nombre,
            apellido,
          }
        }
      });

      if (error) throw error;

      // 2. Actualizar el perfil con datos adicionales
      // (el trigger ya creó el perfil básico, ahora lo completamos)
      if (data.user) {
        const { error: profileError } = await sb
          .from('perfiles')
          .update({
            cuit,
            tipo_persona: tipoPersona,
            perfil_inversor: perfilSeleccionado,
            telefono,
          })
          .eq('id', data.user.id);

        if (profileError) {
          console.warn('Error al actualizar perfil:', profileError.message);
          // No bloqueamos el registro por esto
        }
      }

      // 3. Mostrar mensaje de éxito
      showSuccess('¡Cuenta creada! Revisá tu email para confirmar el registro.');
      btn.innerHTML = '<i class="fas fa-check"></i> ¡Listo!';

      // 4. Redirigir al login después de 3 segundos
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 3000);

    } catch (err) {
      console.error('Error en registro:', err);
      let mensajeError = 'Ocurrió un error al crear la cuenta.';
      if (err.message.includes('already registered')) {
        mensajeError = 'Ese email ya está registrado. ¿Querés iniciar sesión?';
      } else if (err.message.includes('password')) {
        mensajeError = 'La contraseña es muy débil. Probá con una más larga.';
      } else if (err.message) {
        mensajeError = err.message;
      }
      showError(mensajeError);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear cuenta';
    }
  });

  // ── Si el usuario ya está logueado, redirigir al dashboard ─
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
