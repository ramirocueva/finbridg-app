<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — FinBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --negro:      #0A0A0A;
      --negro-card: #141414;
      --negro-med:  #1C1C1C;
      --negro-borde:#2A2A2A;
      --dorado:     #C9A84C;
      --dorado-claro:#D4B96A;
      --dorado-dark:#A8893A;
      --blanco:     #FFFFFF;
      --gris:       #9CA3AF;
      --gris-claro: #E5E7EB;
      --rojo:       #EF4444;
      --verde:      #22C55E;
      --radio:      12px;
      --trans:      all .3s ease;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--negro);
      color: var(--blanco);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed; top: -30%; right: -20%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,.08) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    .auth-container { width: 100%; max-width: 440px; position: relative; z-index: 1; }

    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a {
      text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      display: flex; align-items: center; justify-content: center;
      color: var(--negro); font-size: 1.1rem;
    }
    .logo-text { font-size: 1.5rem; font-weight: 700; color: var(--blanco); }
    .logo-text span { color: var(--dorado); }

    .auth-card {
      background: var(--negro-card);
      border: 1px solid var(--negro-borde);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .auth-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .auth-card .subtitle { font-size: .9rem; color: var(--gris); margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: .82rem; font-weight: 600;
      color: var(--gris-claro); margin-bottom: 8px;
    }
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper i {
      position: absolute; left: 14px;
      color: var(--gris); font-size: .9rem; pointer-events: none;
    }
    .form-group input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: var(--negro-med); border: 1.5px solid var(--negro-borde);
      border-radius: 8px; color: var(--blanco);
      font-family: inherit; font-size: .9rem;
      transition: var(--trans); outline: none;
    }
    .form-group input::placeholder { color: #555; }
    .form-group input:focus {
      border-color: var(--dorado);
      box-shadow: 0 0 0 3px rgba(201,168,76,.15);
    }

    .toggle-pass {
      position: absolute; right: 14px;
      background: none; border: none; cursor: pointer;
      color: var(--gris); font-size: .9rem;
    }
    .toggle-pass:hover { color: var(--dorado); }

    .form-extras {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; font-size: .82rem;
    }
    .form-extras label {
      display: flex; align-items: center; gap: 8px; color: var(--gris); cursor: pointer;
    }
    .form-extras input[type="checkbox"] { accent-color: var(--dorado); }
    .form-extras a { color: var(--dorado); text-decoration: none; font-weight: 600; }
    .form-extras a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      color: var(--negro); font-family: inherit;
      font-size: 1rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: var(--trans);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,.35);
    }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 24px 0; color: var(--gris); font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--negro-borde);
    }

    .btn-google {
      width: 100%; padding: 13px;
      background: var(--negro-med); border: 1.5px solid var(--negro-borde);
      color: var(--gris-claro); font-family: inherit;
      font-size: .9rem; font-weight: 600;
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: var(--trans);
    }
    .btn-google:hover { border-color: var(--dorado); color: var(--dorado); }

    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: .88rem; color: var(--gris);
    }
    .auth-footer a { color: var(--dorado); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: .85rem; font-weight: 500;
      margin-bottom: 20px; display: none;
      align-items: center; gap: 10px;
    }
    .alert.error {
      background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
      color: #FCA5A5;
    }
    .alert.success {
      background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3);
      color: #86EFAC;
    }
    .alert.show { display: flex; }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .form-extras { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="auth-container">

  <div class="auth-logo">
    <a href="index.html">
      <div class="logo-icon"><i class="fas fa-bridge"></i></div>
      <span class="logo-text">FinBridge <span>IA</span></span>
    </a>
  </div>

  <div class="auth-card">
    <h1>Bienvenido de vuelta</h1>
    <p class="subtitle">Ingresá a tu cuenta para ver tu portafolio</p>

    <div class="alert error" id="alertError"><i class="fas fa-circle-exclamation"></i><span id="errorMsg"></span></div>
    <div class="alert success" id="alertSuccess"><i class="fas fa-circle-check"></i><span id="successMsg"></span></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="tu@email.com" required />
          <i class="fas fa-envelope"></i>
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required />
          <i class="fas fa-lock"></i>
          <button type="button" class="toggle-pass" onclick="togglePass()">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-extras">
        <label><input type="checkbox" id="recordarme" /> Recordarme</label>
        <a href="#" id="forgotLink">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <i class="fas fa-right-to-bracket"></i> Iniciar sesión
      </button>
    </form>
  </div>

  <p class="auth-footer">
    ¿No tenés cuenta? <a href="register.html">Crear cuenta gratis</a>
  </p>

</div>

<script>
  // ── Supabase config ────────────────────────────────────────
  const SUPABASE_URL = 'https://hvncglkziyuclnwgrfgj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_43vDXqAmhBtNpnBnkEU8og_BmOSEe1W';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Toggle contraseña ──────────────────────────────────────
  function togglePass() {
    const input = document.getElementById('password');
    const icon  = document.querySelector('.toggle-pass i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  // ── Alertas ────────────────────────────────────────────────
  function showError(msg) {
    document.getElementById('alertSuccess').classList.remove('show');
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('alertError').classList.add('show');
  }
  function showSuccess(msg) {
    document.getElementById('alertError').classList.remove('show');
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('alertSuccess').classList.add('show');
  }

  // ── Login con Supabase ─────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    if (!email || !password) {
      showError('Completá email y contraseña.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ingresando...';

    try {
      const { data, error } = await sb.auth.signInWithPassword({
        email,
        password,
      });

      if (error) throw error;

      showSuccess('¡Bienvenido! Redirigiendo...');
      btn.innerHTML = '<i class="fas fa-check"></i> ¡Listo!';

      // Redirigir al dashboard
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1000);

    } catch (err) {
      console.error('Error login:', err);
      let msg = 'Error al iniciar sesión.';
      if (err.message.includes('Invalid login')) {
        msg = 'Email o contraseña incorrectos.';
      } else if (err.message.includes('Email not confirmed')) {
        msg = 'Confirmá tu email antes de iniciar sesión. Revisá tu bandeja de entrada.';
      } else if (err.message) {
        msg = err.message;
      }
      showError(msg);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Iniciar sesión';
    }
  });

  // ── Recuperar contraseña ───────────────────────────────────
  document.getElementById('forgotLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showError('Ingresá tu email primero y después hacé click en "Olvidé mi contraseña".');
      return;
    }
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html',
      });
      if (error) throw error;
      showSuccess('Te enviamos un email para restablecer tu contraseña. Revisá tu bandeja.');
    } catch (err) {
      showError('Error al enviar el email de recuperación: ' + err.message);
    }
  });

  // ── Si ya está logueado, redirigir ─────────────────────────
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
